<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Submissions - Local Storage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .stat-card p {
            font-size: 12px;
            opacity: 0.9;
        }

        .submissions-container {
            margin-top: 30px;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }

        .submission-card {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .submission-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 10px;
        }

        .submission-header h3 {
            color: #333;
        }

        .submission-id {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
        }

        .submission-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .detail-item {
            background: white;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #e9ecef;
        }

        .detail-label {
            font-weight: 600;
            color: #667eea;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #333;
            word-break: break-word;
            font-size: 14px;
        }

        .detail-value.long {
            max-height: 100px;
            overflow-y: auto;
            padding: 5px;
            background: #f8f9fa;
            border-radius: 3px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }

        .btn-copy {
            background: #17a2b8;
            color: white;
        }

        .btn-copy:hover {
            background: #138496;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .submission-details {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Local Submissions Viewer</h1>
            <p>View all form submissions stored in your browser's localStorage</p>
        </header>

        <div class="success-message" id="successMsg">✓ Action completed successfully!</div>

        <div class="controls">
            <button class="btn-primary" onclick="loadSubmissions()">🔄 Refresh</button>
            <button class="btn-secondary" onclick="downloadAsJSON()">⬇️ Download JSON</button>
            <button class="btn-secondary" onclick="exportAsCSV()">📊 Export CSV</button>
            <button class="btn-danger" onclick="clearAllSubmissions()">🗑️ Clear All</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3 id="totalCount">0</h3>
                <p>Total Submissions</p>
            </div>
            <div class="stat-card">
                <h3 id="storageSize">0 KB</h3>
                <p>Storage Used</p>
            </div>
        </div>

        <div class="submissions-container" id="submissionsContainer">
            <div class="no-data">No submissions found. Complete the form to see data here.</div>
        </div>
    </div>

    <script>
        function loadSubmissions() {
            const submissions = JSON.parse(localStorage.getItem('scholarshipSubmissions')) || [];
            const container = document.getElementById('submissionsContainer');
            
            document.getElementById('totalCount').textContent = submissions.length;
            const storageSize = (JSON.stringify(submissions).length / 1024).toFixed(2);
            document.getElementById('storageSize').textContent = `${storageSize} KB`;

            if (submissions.length === 0) {
                container.innerHTML = '<div class="no-data">No submissions found. Complete the form to see data here.</div>';
                return;
            }

            container.innerHTML = submissions.map((sub, index) => `
                <div class="submission-card">
                    <div class="submission-header">
                        <h3>#${index + 1} - ${sub.fullName || 'Anonymous'}</h3>
                        <span class="submission-id">ID: ${sub.id}</span>
                    </div>
                    <div class="submission-details">
                        <div class="detail-item">
                            <div class="detail-label">Full Name</div>
                            <div class="detail-value">${sub.fullName || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Email</div>
                            <div class="detail-value">${sub.email || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Phone</div>
                            <div class="detail-value">${sub.phone || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Date of Birth</div>
                            <div class="detail-value">${sub.dob || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Institution</div>
                            <div class="detail-value">${sub.institution || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Program/Major</div>
                            <div class="detail-value">${sub.program || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">GPA</div>
                            <div class="detail-value">${sub.gpa || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Year of Study</div>
                            <div class="detail-value">${sub.year || 'N/A'}</div>
                        </div>
                        <div class="detail-item" style="grid-column: 1 / -1;">
                            <div class="detail-label">Address</div>
                            <div class="detail-value long">${sub.address || 'N/A'}</div>
                        </div>
                        <div class="detail-item" style="grid-column: 1 / -1;">
                            <div class="detail-label">Essay</div>
                            <div class="detail-value long">${sub.essay || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Submitted At</div>
                            <div class="detail-value">${sub.submittedAt || 'N/A'}</div>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-small btn-copy" onclick="copyToClipboard('${sub.id}')">📋 Copy JSON</button>
                        <button class="btn-small btn-delete" onclick="deleteSubmission('${sub.id}')">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteSubmission(id) {
            if (confirm('Are you sure you want to delete this submission?')) {
                let submissions = JSON.parse(localStorage.getItem('scholarshipSubmissions')) || [];
                submissions = submissions.filter(s => s.id !== parseInt(id));
                localStorage.setItem('scholarshipSubmissions', JSON.stringify(submissions));
                showSuccess('Submission deleted!');
                loadSubmissions();
            }
        }

        function clearAllSubmissions() {
            if (confirm('Are you SURE you want to delete ALL submissions? This cannot be undone.')) {
                localStorage.removeItem('scholarshipSubmissions');
                showSuccess('All submissions cleared!');
                loadSubmissions();
            }
        }

        function copyToClipboard(id) {
            const submissions = JSON.parse(localStorage.getItem('scholarshipSubmissions')) || [];
            const submission = submissions.find(s => s.id === parseInt(id));
            if (submission) {
                navigator.clipboard.writeText(JSON.stringify(submission, null, 2));
                showSuccess('Copied to clipboard!');
            }
        }

        function downloadAsJSON() {
            const submissions = JSON.parse(localStorage.getItem('scholarshipSubmissions')) || [];
            const dataStr = JSON.stringify(submissions, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `submissions-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            showSuccess('File downloaded!');
        }

        function exportAsCSV() {
            const submissions = JSON.parse(localStorage.getItem('scholarshipSubmissions')) || [];
            if (submissions.length === 0) {
                alert('No submissions to export!');
                return;
            }

            const headers = Object.keys(submissions[0]);
            const csv = [
                headers.join(','),
                ...submissions.map(s => headers.map(h => `"${(s[h] || '').toString().replace(/"/g, '""')}"`).join(','))
            ].join('\n');

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `submissions-${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            showSuccess('CSV exported!');
        }

        function showSuccess(message) {
            const msgEl = document.getElementById('successMsg');
            msgEl.textContent = '✓ ' + message;
            msgEl.classList.add('show');
            setTimeout(() => msgEl.classList.remove('show'), 3000);
        }

        // Load submissions when page opens
        loadSubmissions();

        // Auto-refresh every 5 seconds
        setInterval(loadSubmissions, 5000);

        // Keyboard shortcut: Press 'R' to refresh
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                loadSubmissions();
            }
        });
    </script>
</body>
</html>
